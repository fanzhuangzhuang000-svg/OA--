# =============================================================
# OA 综合管理平台 - Docker 开发环境
# PHP 8.3 + PostgreSQL 15 + Nginx + Node.js
# =============================================================
# 使用方法:
#   cp .env.docker .env          # 复制环境变量模板
#   docker compose up -d         # 启动所有服务
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate --seed
#   访问: http://localhost       (前端 + API)
#   访问: http://localhost:5173  (Vite HMR 热更新)
# =============================================================

services:
  # -------------------------------------------------------
  # PostgreSQL 15 数据库
  # -------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: oa-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-oa_security}
      POSTGRES_USER: ${DB_USERNAME:-oa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oa_secret_2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pc-api/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-oa_user} -d ${DB_DATABASE:-oa_security}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oa-network
    command: postgres -c shared_buffers=256MB -c work_mem=16MB -c maintenance_work_mem=256MB -c effective_cache_size=1GB

  # -------------------------------------------------------
  # PHP 8.3 FPM (Laravel API)
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: oa-app
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-oa_security}
      DB_USERNAME: ${DB_USERNAME:-oa_user}
      DB_PASSWORD: ${DB_PASSWORD:-oa_secret_2024}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./pc-api:/var/www/html
      - php_socket:/var/run/php
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oa-network

  # -------------------------------------------------------
  # Nginx (前端 + API 反向代理)
  # -------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: oa-nginx
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./pc-api:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pc-web/dist:/var/www/pc-web/dist:ro
      - php_socket:/var/run/php
    depends_on:
      - app
    networks:
      - oa-network

  # -------------------------------------------------------
  # Node.js (Vite 开发服务器 / 前端构建)
  # -------------------------------------------------------
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: oa-node
    restart: unless-stopped
    ports:
      - "3002:3000"
      - "5173:5173"
    environment:
      # Vite 代理目标 — 指向 Nginx（处理 API 请求）
      VITE_API_PROXY: http://nginx
      VITE_APP_NAME: 安防运维OA
    volumes:
      - ./pc-web:/app
      - /app/node_modules
    depends_on:
      - nginx
    networks:
      - oa-network
    # 默认不启动 Vite dev server，需要时手动启动
    # docker compose run --rm node npm run dev
    command: ["tail", "-f", "/dev/null"]

  # -------------------------------------------------------
  # Redis (缓存 / 会话 / 队列)
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: oa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oa-network
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  php_socket:
    driver: local

networks:
  oa-network:
    driver: bridge