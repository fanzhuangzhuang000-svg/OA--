<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>已离线 - OA 系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .container { text-align: center; padding: 24px; max-width: 480px; }
    .icon { font-size: 96px; margin-bottom: 24px; opacity: 0.9; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 15px; opacity: 0.85; line-height: 1.6; margin-bottom: 24px; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 10px 20px; border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.1); color: #fff;
      border-radius: 8px; font-size: 14px; cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.2); }
    button.primary { background: rgba(255,255,255,0.95); color: #667eea; font-weight: 600; }
    button.primary:hover { background: #fff; }
    .tip { margin-top: 32px; font-size: 12px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>您已离线</h1>
    <p>当前没有网络连接, 请检查您的网络后再试。<br>已浏览过的页面仍可访问。</p>
    <div class="actions">
      <button class="primary" onclick="location.reload()">重新连接</button>
      <button onclick="history.back()">返回上一页</button>
    </div>
    <div class="tip">OA 运维系统 · V0.5.7 块6 PWA</div>
  </div>
</body>
</html>
