# =============================================================
# Nginx 配置 - OA 综合管理平台
# 前端静态文件 + Laravel API 反向代理
# =============================================================

server {
    listen 80;
    server_name localhost;

    # 字符编码
    charset utf-8;

    # 日志
    access_log /var/log/nginx/oa_access.log;
    error_log  /var/log/nginx/oa_error.log;

    # 文件上传限制
    client_max_body_size 64M;

    # --- 前端静态文件 (生产构建) ---
    location /web/ {
        alias /var/www/html/public/web/;
        index index.html;
        try_files $uri $uri/ /web/index.html;

        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- Laravel API ---
    location / {
        root /var/www/html/public;
        index index.php;

        # 尝试静态文件 → PHP 入口
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP-FPM 处理 ---
    location ~ \.php$ {
        root /var/www/html/public;

        # 使用 Unix Socket 连接 PHP-FPM
        fastcgi_pass unix:/var/run/php/php-fpm.sock;

        # 备选: 使用 TCP 连接
        # fastcgi_pass app:9000;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # 超时设置
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout    300;
        fastcgi_read_timeout    300;

        # 缓冲
        fastcgi_buffer_size        128k;
        fastcgi_buffers            4 256k;
        fastcgi_busy_buffers_size  256k;
    }

    # --- 禁止访问隐藏文件 ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- 健康检查 ---
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # --- Vite HMR WebSocket 代理 (开发模式) ---
    location /ws {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
